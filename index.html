    <!-- ── Theme flash prevention ── -->
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t === "dark") document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
        var c = localStorage.getItem("accentColor");
        if (c) document.documentElement.style.setProperty("--brand", c);
      })();
    </script>

    <!-- ── Google Translate banner suppression ── -->
    <style>

        pointer-events: none !important;
      }
      body {
        top: 0 !important;
        position: static !important;
      }
    </style>
    <script>
      (function () {
        var observer = new MutationObserver(function () {
          if (document.body && document.body.style.top)
            document.body.style.top = "0px";
          if (document.body && document.body.style.position === "relative")
            document.body.style.position = "static";
        });
        document.addEventListener("DOMContentLoaded", function () {
          observer.observe(document.body, {
            attributes: true,
            attributeFilter: ["style"],
          });
        });
      })();
    </script>
