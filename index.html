<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>অপরাজেয় — Oporajeo Community Services</title>
    <script>
      // Apply saved theme BEFORE React loads to prevent flash
      (function () {
        var t = localStorage.getItem("theme");
        if (t === "dark") document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
      })();
    </script>
    <style>
      /* Hide Google Translate banner immediately */
      .goog-te-banner-frame,
      iframe.goog-te-banner-frame,
      .skiptranslate {
        display: none !important;
        height: 0 !important;
        pointer-events: none !important;
      }
      body {
        top: 0 !important;
        position: static !important;
      }
    </style>
    <script>
      // Fix Google Translate body offset that breaks click hit-testing
      (function () {
        var observer = new MutationObserver(function () {
          if (document.body && document.body.style.top) {
            document.body.style.top = "0px";
          }
          if (document.body && document.body.style.position === "relative") {
            document.body.style.position = "static";
          }
        });
        document.addEventListener("DOMContentLoaded", function () {
          observer.observe(document.body, {
            attributes: true,
            attributeFilter: ["style"],
          });
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Google Translate (hidden widget, triggered programmatically) -->
    <div
      id="google_translate_element"
      style="display: none; visibility: hidden; position: absolute"
    ></div>
    <script>
      window.googleTranslateElementInit = function () {
        new window.google.translate.TranslateElement(
          { pageLanguage: "en", autoDisplay: false },
          "google_translate_element",
        );
      };
    </script>
    <script
      src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
      async
    ></script>
  </body>
</html>
